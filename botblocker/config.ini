# BotBlocker configuration
# See documentation for full reference

[general]
poll_interval = 10
log_parse_window = 300
log_level = info

[thresholds]
load_multiplier = 1.5
block_score = 60
requests_per_minute = 50
error_rate_pct = 80
repeat_offender_n = 3
temp_block_seconds = 3600

[paths]
nginx_log_glob = /var/log/nginx/access.log
apache_log_glob = /home/*/domains/*/logs/access.log
whitelist_file = /usr/local/botblocker/whitelist.txt
blocked_log = /var/log/botblocker/blocked.log
daemon_log = /var/log/botblocker/botblocker.log
state_file = /var/lib/botblocker/state.json
honeypot_paths = /usr/local/botblocker/honeypot_paths.txt

[csf]
csf_bin = /usr/sbin/csf

[scoring]
high_request_rate = 30
high_error_rate = 25
known_scanner_ua = 20
honeypot_path_hit = 40
multi_vhost_scan = 15
cross_domain_thresh = 3
